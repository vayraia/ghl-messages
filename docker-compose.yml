services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  api:
    build: .
    image: go-high-level:local
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # HTTP tier only ingests + enqueues; the worker service drains the queues.
      PROCESS_JOBS: "false"
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "3000:3000"
    command: ["node", "dist/main.js"]

  worker:
    image: go-high-level:local
    restart: unless-stopped
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
      # Dedicated job processor. Explicit for clarity (true is the default).
      PROCESS_JOBS: "true"
    depends_on:
      redis:
        condition: service_healthy
      api:
        condition: service_started
    command: ["node", "dist/worker.js"]

volumes:
  redis-data:
